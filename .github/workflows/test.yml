name: test

on:
  push:
  pull_request:

jobs:
  shell-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n install.sh uninstall.sh tests/run.sh skills/gmail/scripts/*.sh
      - name: Run installer tests
        run: ./tests/run.sh
